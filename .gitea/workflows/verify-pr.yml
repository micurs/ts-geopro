name: Verify Pull Request

on:
  pull_request:
    types: [
      opened,
      synchronize,
    ] # Trigger the workflow when a PR is opened or updated

jobs:
  test-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }} # Checkout the PR branch

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Specify the Node.js version (22.12+ required by Vite 8)

      - name: Set up Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x # Specify the Deno version

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Run Tests
        run: pnpm run test
